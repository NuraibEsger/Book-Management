databaseChangeLog:
  - changeSet:
      id: 003-create-book-author-table
      author: yourname
      changes:
        - createTable:
            tableName: book_authors
            columns:
              - column:
                  name: book_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: author_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: book_authors
            columnNames: book_id, author_id
        - addForeignKeyConstraint:
            baseTableName: book_authors
            baseColumnNames: book_id
            referencedTableName: books
            referencedColumnNames: id
            constraintName: fk_book_authors_book
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: book_authors
            baseColumnNames: author_id
            referencedTableName: authors
            referencedColumnNames: id
            constraintName: fk_book_authors_author
            onDelete: CASCADE